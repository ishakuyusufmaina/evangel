  class StdList extends Array {
  constructor() {
    super();
  }
  push(elm) {
    if (this.length == 0) {
      elm.position = 1;
    } else {
      this.position(elm);
    }
    super.unshift(elm);
    super.sort((a, b) => {
      return b.score - a.score;
    });
  }

  position(elm) {
    for (let i = 0; i < this.length; i++) {
      if (Number(this[i].score) == Number(elm.score)) {
        elm.position = this[i].position;
        return;
      } else if (Number(this[i].score) < Number(elm.score)) {
        elm.position = this[i].position;
        for (let j = i; j < this.length; j++) {
          this[j].position++;
        }
        return;
      } else {
        elm.position = this[this.length - 1].position + 1;
      }
    }
  }
}

    function remark(test, exam){
      let total = test+exam;
      let dict= {
        "F": "Fail",
        "E": "Poor",
        "D": "Fair", 
        "C": "Good", 
        "B": "Very Good",
        "A": "Excellent"
      };
      let g = grade(test, exam);
      return dict[g]
    }
    
    function grade(test, exam){
      let total = test + exam;
      /* <40 F, <=45 E,  <=49 D, <=59 C, <= 69 B, * 70 A */
      let grade = null;
        if (total < 40){ grade="F"}
        else if (total <= 45) {grade="E"}
        else if (total <= 49 ) {grade="D"}
        else if (total <= 59 ) {grade="C"}
        else if (total <= 69 ) {grade="B"}
        else grade = "A";
          
          return grade;
    }

  }
  
  
  
  
   function assignPositions(students) {
  // Defensive: ensure score and sc numeric
  students.forEach(s => {
    s.score = Number(s.score) || 0;
    s.sc = Number(s.sc) || 0;
  });

  // Compute average guardedly (students with sc===0 go to the end)
  students.sort((a, b) => {
    const aAvg = a.sc > 0 ? (a.score / a.sc) : -Infinity;
    const bAvg = b.sc > 0 ? (b.score / b.sc) : -Infinity;
    // sort descending by average, and if tie, fall back to total score descending
    if (bAvg === aAvg) return Number(b.score) - Number(a.score);
    return bAvg - aAvg;
  });

  // Assign positions with tie-handling using tolerance
  const EPS = 1e-9;
  let currentPosition = 0;
  let lastAvg = null;
  let lastPositionAssigned = 0;

  students.forEach((student, idx) => {
    currentPosition = idx + 1;
    const avg = student.sc > 0 ? student.score / student.sc : -Infinity;

    if (lastAvg !== null && Math.abs(avg - lastAvg) <= EPS) {
      // tie -> same position as previous
      student.position = lastPositionAssigned;
    } else {
      student.position = currentPosition;
      lastPositionAssigned = currentPosition;
      lastAvg = avg;
    }

    // Link prev/next for convenience (clear first to avoid stale refs)
    student.prev = students[idx - 1] || null;
    student.next = students[idx + 1] || null;
  });
}

  function tosf(num, sf) {
  if (num === 0) return 0;
  return Number(num.toPrecision(sf));
     }
  
  function comment(average, interpsModel){
    for (const interp of interpsModel){
      if (Number(average) < Number(interp.range))
        return interp.comment;
    }
    
    let lastInterp = interpsModel[interpsModel.length-1];
    return lastInterp?.comment || '';
  }
  
  
  function toSuperscriptOrdinal(num) {
  const suffixes = {
    '1': 'ˢᵗ',
    '2': 'ⁿᵈ',
    '3': 'ʳᵈ'
  };

  // Handle 11th, 12th, 13th as special cases
  const lastTwo = num % 100;
  let suffix = 'ᵗʰ';

  if (lastTwo < 11 || lastTwo > 13) {
    const lastDigit = num % 10;
    suffix = suffixes[lastDigit] || 'ᵗʰ';
  }

  return num + suffix;
}

  const MAX_WIDTH = 1024;
const MAX_HEIGHT = 1024;
const QUALITY = 0.7; // 0.1 - 1.0
async  function optimizeImage(url) {
   const file  = await urlToFile(url);
  console.log(88)
  return new Promise((resolve) => {

    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {

      let { width, height } = img;

      // Maintain aspect ratio
      if (width > MAX_WIDTH || height > MAX_HEIGHT) {
        const ratio = Math.min(
          MAX_WIDTH / width,
          MAX_HEIGHT / height
        );

        width *= ratio;
        height *= ratio;
      }

      // Canvas
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);

      // Convert to Blob (Compressed)
      canvas.toBlob(
        blob => resolve(blob),
        "image/jpeg",
        QUALITY
      );
    };

   reader.readAsDataURL(file);
    //console.log(999);
   // const u=URL.createObjectURL(file);
   // console.log(u);
    //return u; // URL.createObjectURL(file);
  });
}
  
  async function urlToFile(url, filename = "image.png") {
  // Fetch the image from the URL
  const response = await fetch(url, { mode: "cors" });
  if (!response.ok) throw new Error(`Failed to fetch image: ${response.statusText}`);

  // Convert response to Blob
  const blob = await response.blob();

  // Create a File from the Blob
  const file = new File([blob], filename, { type: blob.type });
  return file;
}
